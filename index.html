<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monasync Mail</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <header class="topbar">
    <div class="logo">MONASYNC</div>

    <nav class="topnav">
      <button class="active">메일</button>
      <button>주소록</button>
    </nav>

    <div class="user-switcher">
      <span>현재 사용자</span>
      <select id="userSelect"></select>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="compose">
        <button>메일 쓰기</button>
        <button>내게 쓰기</button>
      </div>

      <section class="side-section">
        <h3>메일함</h3>
        <ul class="folders" id="folderList">
          <li class="active" data-folder="all">전체 메일함</li>
          <li data-folder="inbox">받은 메일함</li>
          <li data-folder="self">내게 쓴 메일함</li>
          <li data-folder="sent">보낸 메일함</li>
          <li data-folder="archive">메일 보관함</li>
          <li data-folder="spam">스팸 메일함</li>
          <li data-folder="trash">휴지통</li>
        </ul>
      </section>

      <section class="side-section">
        <h3>내 부서</h3>
        <ul class="folders small">
          <li>영업팀</li>
          <li>기술팀</li>
          <li>구매팀</li>
        </ul>
      </section>

      <section class="side-section">
        <h3>프로젝트</h3>
        <ul class="folders small" id="projectList"></ul>
      </section>
    </aside>

    <main class="main">
      <section class="titlebar">
        <div>
          <h1 id="pageTitle">전체 메일함 <span id="mailCount"></span></h1>
          <p id="userInfo"></p>
        </div>
        <input id="searchInput" placeholder="메일 검색" />
      </section>

      <section class="scope-tabs">
        <button class="active" data-scope="company">전체메일함</button>
        <button data-scope="personal">개인메일함</button>
      </section>

      <section class="toolbar">
        <button>답장</button>
        <button>전체답장</button>
        <button>전달</button>
        <button>삭제</button>
        <button>읽음</button>
        <button>스팸</button>
        <button>이동</button>
      </section>

      <table class="mail-table">
        <thead>
          <tr>
            <th><input type="checkbox" /></th>
            <th>별</th>
            <th>첨부</th>
            <th>상대</th>
            <th>제목</th>
            <th>프로젝트</th>
            <th>발송자</th>
            <th>읽음</th>
            <th>상태</th>
            <th>날짜</th>
            <th>크기</th>
          </tr>
        </thead>
        <tbody id="mailTableBody"></tbody>
      </table>
    </main>
  </div>

  <script src="./assets/js/app.js"></script>
</body>
</html>
