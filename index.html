<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monasync Mail</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-rail">
      <div class="rail-logo">M</div>
      <button class="rail-item active">✉</button>
      <button class="rail-item">📇</button>
      <button class="rail-item">📁</button>
      <button class="rail-item">👥</button>
      <button class="rail-item">⚙</button>
    </aside>

    <aside class="sidebar">
      <div class="brand">MONASYNC</div>

      <div class="compose">
        <button id="composeButton">New Mail</button>
        <button class="compose-more" id="composeMoreButton">⌄</button>
      </div>

      <section class="side-section">
        <h3>MAILBOX</h3>
        <ul class="folders" id="folderList">
          <li class="active" data-folder="all">전체 메일함</li>
          <li data-folder="inbox">받은 메일함</li>
          <li data-folder="self">내게 쓴 메일함</li>
          <li data-folder="sent">보낸 메일함</li>
          <li data-folder="archive">메일 보관함</li>
          <li data-folder="spam">스팸 메일함</li>
          <li data-folder="trash">휴지통</li>
        </ul>
      </section>

      <section class="side-section">
        <h3>DEPARTMENTS</h3>
        <ul class="folders small" id="deptList">
          <li class="active" data-dept="all">전체 부서</li>
          <li data-dept="영업팀">영업팀</li>
          <li data-dept="기술팀">기술팀</li>
          <li data-dept="구매팀">구매팀</li>
        </ul>
      </section>

      <section class="side-section">
        <h3>PROJECTS</h3>
        <ul class="folders small" id="projectList"></ul>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <nav class="topnav">
          <button class="active">Mail</button>
          <button>Contacts</button>
        </nav>

        <div class="search-wrap">
          <span>⌕</span>
          <input id="searchInput" placeholder="Search mail" />
        </div>

        <div class="user-switcher">
          <span>현재 사용자</span>
          <select id="userSelect"></select>
        </div>
      </header>

      <section class="titlebar">
        <div>
          <h1 id="pageTitle">전체 메일함 <span id="mailCount"></span></h1>
          <p id="userInfo"></p>
        </div>
      </section>

      <section class="scope-tabs" id="mailScopeTabs"></section>

      <section class="toolbar">
        <button id="toolbarReplyButton">답장</button>
        <button>전체답장</button>
        <button>전달</button>
        <button>삭제</button>
        <button>읽음</button>
        <button>스팸</button>
        <button>이동</button>
      </section>

      <section class="content-grid">
        <div class="mail-list-panel">
          <table class="mail-table">
            <thead>
              <tr>
                <th><input type="checkbox" /></th>
                <th>별</th>
                <th>첨부</th>
                <th>상대</th>
                <th>제목</th>
                <th>프로젝트</th>
                <th>발신주체</th>
                <th>작성자</th>
                <th>읽음</th>
                <th>상태</th>
                <th>날짜</th>
                <th>크기</th>
              </tr>
            </thead>
            <tbody id="mailTableBody"></tbody>
          </table>
        </div>

        <aside class="detail-panel">
          <div id="detailBody" class="detail-empty">메일을 선택하세요.</div>
        </aside>
      </section>
    </main>
  </div>

  <div class="compose-modal hidden" id="composeModal">
    <div class="compose-window">
      <header class="compose-header">
        <strong>새 메일 작성</strong>
        <button id="composeCloseButton">×</button>
      </header>

      <div class="compose-form">
        <label>
          <span>발신 주체</span>
          <select id="composeFromSelect"></select>
        </label>

        <label>
          <span>서명</span>
          <select id="composeSignatureSelect"></select>
        </label>

        <label>
          <span>받는 사람</span>
          <input id="composeToInput" placeholder="customer@example.com" />
        </label>

        <label>
          <span>제목</span>
          <input id="composeSubjectInput" placeholder="메일 제목" />
        </label>

        <label class="compose-body-label">
          <span>본문</span>
          <textarea id="composeBodyInput" placeholder="본문을 입력하세요."></textarea>
        </label>

        <div class="signature-preview-wrap">
          <div class="signature-preview-title">실제 발송 본문 미리보기</div>
          <div class="mail-body compose-preview" id="composePreview"></div>
        </div>
      </div>

      <footer class="compose-footer">
        <button id="sendDemoButton" class="primary">데모 발송</button>
        <button id="composeCancelButton">취소</button>
      </footer>
    </div>
  </div>

  <script src="./assets/js/app.js"></script>
</body>
</html>
